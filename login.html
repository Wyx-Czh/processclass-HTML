<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智光ERP管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="scripts/tailwind-config.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4">
                <i class="fas fa-desktop text-primary text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">智光ERP系统</h2>
            <p class="text-gray-500 mt-2 text-sm">请输入您的姓名和学号进行验证</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">姓名 (用户名)</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <input type="text" id="username" required placeholder="请输入您的姓名" class="pl-10 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-primary focus:border-primary transition outline-none">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">学号 (密码)</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" required placeholder="请输入对应的学号" class="pl-10 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-primary focus:border-primary transition outline-none">
                </div>
            </div>
            
            <div id="errorMessage" class="bg-red-50 text-red-600 text-sm p-3 rounded-lg hidden flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span>用户名或密码错误，请核对信息。</span>
            </div>
            
            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition mt-6">
                安全登录
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="index.html" class="text-sm text-gray-500 hover:text-primary transition flex items-center justify-center">
                <i class="fas fa-arrow-left mr-1"></i> 返回官网首页
            </a>
        </div>
    </div>

    <script src="scripts/login.js"></script>
</body>
</html>
